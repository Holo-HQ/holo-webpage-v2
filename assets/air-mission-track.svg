<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="airDots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="0.65" fill="rgba(245,158,11,0.12)"/>
  </pattern>
  <filter id="airGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="800" height="300" fill="#02040a"/>
<rect width="800" height="300" fill="url(#airDots)"/>

<!-- Grid lines -->
<line x1="0" y1="100" x2="800" y2="100" stroke="rgba(245,158,11,0.04)" stroke-width="0.5"/>
<line x1="0" y1="200" x2="800" y2="200" stroke="rgba(245,158,11,0.04)" stroke-width="0.5"/>
<line x1="200" y1="0" x2="200" y2="300" stroke="rgba(245,158,11,0.04)" stroke-width="0.5"/>
<line x1="400" y1="0" x2="400" y2="300" stroke="rgba(245,158,11,0.04)" stroke-width="0.5"/>
<line x1="600" y1="0" x2="600" y2="300" stroke="rgba(245,158,11,0.04)" stroke-width="0.5"/>

<!-- Radar rings centered at (580, 150) -->
<circle cx="580" cy="150" r="55"  fill="none" stroke="rgba(245,158,11,0.10)" stroke-width="0.8"/>
<circle cx="580" cy="150" r="110" fill="none" stroke="rgba(245,158,11,0.07)" stroke-width="0.8"/>
<circle cx="580" cy="150" r="165" fill="none" stroke="rgba(245,158,11,0.05)" stroke-width="0.8"/>
<circle cx="580" cy="150" r="220" fill="none" stroke="rgba(245,158,11,0.03)" stroke-width="0.5"/>

<!-- Radar crosshairs -->
<line x1="580" y1="20"  x2="580" y2="280" stroke="rgba(245,158,11,0.05)" stroke-width="0.5"/>
<line x1="360" y1="150" x2="800" y2="150" stroke="rgba(245,158,11,0.05)" stroke-width="0.5"/>

<!-- Radar sweep line + glow -->
<line x1="580" y1="150" x2="636" y2="97" stroke="rgba(245,158,11,0.45)" stroke-width="1" filter="url(#airGlow)"/>
<!-- Sweep sector fill -->
<path d="M 580,150 L 635,95 A 78,78 0 0,0 580,72 Z" fill="rgba(245,158,11,0.04)"/>

<!-- Flight path -->
<path d="M 55,205 C 100,195 160,175 220,165 S 340,152 430,147 S 510,143 545,141"
      stroke="rgba(245,158,11,0.45)" stroke-width="1.2" stroke-dasharray="7,5" fill="none"/>

<!-- Projected path (ahead of aircraft, fainter) -->
<path d="M 545,141 C 570,139 610,136 660,133"
      stroke="rgba(245,158,11,0.2)" stroke-width="1" stroke-dasharray="4,6" fill="none"/>

<!-- Waypoint 1 -->
<g transform="translate(220,165)">
  <rect x="-5" y="-5" width="10" height="10" transform="rotate(45)" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.65)" stroke-width="1"/>
  <text x="10" y="4" fill="rgba(245,158,11,0.55)" font-family="JetBrains Mono,monospace" font-size="8">WP1</text>
</g>

<!-- Waypoint 2 -->
<g transform="translate(340,151)">
  <rect x="-5" y="-5" width="10" height="10" transform="rotate(45)" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.65)" stroke-width="1"/>
  <text x="10" y="4" fill="rgba(245,158,11,0.55)" font-family="JetBrains Mono,monospace" font-size="8">WP2</text>
</g>

<!-- Waypoint 3 -->
<g transform="translate(430,147)">
  <rect x="-5" y="-5" width="10" height="10" transform="rotate(45)" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.65)" stroke-width="1"/>
  <text x="10" y="4" fill="rgba(245,158,11,0.55)" font-family="JetBrains Mono,monospace" font-size="8">WP3</text>
</g>

<!-- Aircraft symbol (top-down jet silhouette) at (545, 141) -->
<g transform="translate(545,141) rotate(-5)" filter="url(#airGlow)">
  <!-- Fuselage -->
  <line x1="-20" y1="0"  x2="20"  y2="0"  stroke="rgba(245,158,11,0.95)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Swept wings -->
  <path d="M -2,0 L -14,-16 L -6,-1" fill="rgba(245,158,11,0.75)" stroke="none"/>
  <path d="M -2,0 L -14, 16 L -6, 1" fill="rgba(245,158,11,0.75)" stroke="none"/>
  <!-- Tail fins -->
  <path d="M -16,0 L -22,-7 L -17,-1" fill="rgba(245,158,11,0.6)" stroke="none"/>
  <path d="M -16,0 L -22, 7 L -17, 1" fill="rgba(245,158,11,0.6)" stroke="none"/>
  <!-- Nose -->
  <circle cx="20" cy="0" r="2.5" fill="rgba(245,158,11,1)"/>
  <!-- Target ring -->
  <circle cx="0"  cy="0" r="26" fill="none" stroke="rgba(245,158,11,0.28)" stroke-width="1" stroke-dasharray="4,4"/>
</g>

<!-- Data panel -->
<rect x="18" y="18" width="170" height="134" rx="1"
      fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.22)" stroke-width="0.8"/>
<text x="28" y="36" fill="rgba(245,158,11,0.4)" font-family="JetBrains Mono,monospace" font-size="7" letter-spacing=".1em">FAC / NEXXO C2</text>
<line x1="18" y1="42" x2="188" y2="42" stroke="rgba(245,158,11,0.14)" stroke-width="0.5"/>

<text x="28" y="57"  fill="rgba(245,158,11,0.35)" font-family="JetBrains Mono,monospace" font-size="7.5">ALT</text>
<text x="80" y="57"  fill="rgba(245,158,11,0.85)" font-family="JetBrains Mono,monospace" font-size="7.5">FL 085</text>

<text x="28" y="73"  fill="rgba(245,158,11,0.35)" font-family="JetBrains Mono,monospace" font-size="7.5">SPD</text>
<text x="80" y="73"  fill="rgba(245,158,11,0.85)" font-family="JetBrains Mono,monospace" font-size="7.5">480 KT</text>

<text x="28" y="89"  fill="rgba(245,158,11,0.35)" font-family="JetBrains Mono,monospace" font-size="7.5">FUEL</text>
<text x="80" y="89"  fill="rgba(245,158,11,0.85)" font-family="JetBrains Mono,monospace" font-size="7.5">72 %</text>

<text x="28" y="105" fill="rgba(245,158,11,0.35)" font-family="JetBrains Mono,monospace" font-size="7.5">HDG</text>
<text x="80" y="105" fill="rgba(245,158,11,0.85)" font-family="JetBrains Mono,monospace" font-size="7.5">278° MAG</text>

<text x="28" y="121" fill="rgba(245,158,11,0.35)" font-family="JetBrains Mono,monospace" font-size="7.5">ETA</text>
<text x="80" y="121" fill="rgba(245,158,11,0.85)" font-family="JetBrains Mono,monospace" font-size="7.5">00:47</text>

<line x1="18" y1="130" x2="188" y2="130" stroke="rgba(245,158,11,0.1)" stroke-width="0.5"/>
<circle cx="30" cy="141" r="3" fill="rgba(34,197,94,0.85)"/>
<text x="38" y="145" fill="rgba(34,197,94,0.85)" font-family="JetBrains Mono,monospace" font-size="7.5" letter-spacing=".06em">MISIÓN ACTIVA</text>

<!-- HUD corners -->
<path d="M0,18 L0,0 L18,0"   stroke="rgba(245,158,11,0.38)" stroke-width="1" fill="none"/>
<path d="M782,0 L800,0 L800,18"  stroke="rgba(245,158,11,0.38)" stroke-width="1" fill="none"/>
<path d="M0,282 L0,300 L18,300"  stroke="rgba(245,158,11,0.38)" stroke-width="1" fill="none"/>
<path d="M782,300 L800,300 L800,282" stroke="rgba(245,158,11,0.38)" stroke-width="1" fill="none"/>

<text x="10"  y="293" fill="rgba(245,158,11,0.22)" font-family="JetBrains Mono,monospace" font-size="7" letter-spacing=".1em">NEXXO C2 / AIR OPS TRACK</text>
<text x="640" y="293" fill="rgba(245,158,11,0.22)" font-family="JetBrains Mono,monospace" font-size="7" letter-spacing=".1em">CLASIFICADO</text>
</svg>
